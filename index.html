<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Door System</title>

<style>
body {
  margin: 0;
  background-image: linear-gradient(to right top, #051937, #004d7a, #008793, #00bf72, #a8eb12);
  font-family: 'Lucida Sans', Geneva, Verdana, sans-serif;
}

/* ================= NAVBAR ================= */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  background:black;
  display:flex;
  justify-content:center;
  gap:40px;
  padding:15px;

.navbar a{
  color:white;
  text-decoration:none;

}

/* ================= PAGES ================= */
.page {
  display: none;
  padding-top: 120px;
  min-height: 100vh;
  text-align: center;
}

.page.active {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ================= DOOR STYLES ================= */
#door-container {
      position: relative;
      width: 180px;
      height: 300px;
      perspective: 1000px;
      background-image: url(OIP.jpeg);
      background-size: cover;
      border: 4px solid black;
      border-radius: 5px;
      margin-top: 30px;
    }
#glow-behind {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle, rgba(0,255,255,0.2), transparent);
      border-radius: 5px;
      z-index: 0;
      opacity: 0;
      transition: opacity 1s;
    }

#door {
      width: 100%;
      height: 100%;
      background-color: #ff009d;
      border-right: 4px solid #142c2e;
      

      border-radius: 5px;
      position: absolute;
      transform-origin: left center;
      transition: transform 1s ease-in-out;
      box-shadow: 8px 0 15px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      z-index: 2;
      cursor: pointer;
    }

#door.open{
  transform: rotateY(-100deg);
}

#lock-led {
      position: absolute;
      bottom: 130px;
      left: 85%;
      transform: translateX(-50%);
      width: 16px;
      height: 50px;
      background-color: #000000;
      border-radius: 25%;

      box-shadow: 0 0 8px #f00;
    }
#door-name {
      position: absolute;
      top: 1px;
      width: 100%;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 1px 1px 2px #000;
      letter-spacing: 1px;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
    #room-inside {
      position: absolute;
      inset: 0;
      background: #ff009d;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
  
    #door.open #room-inside {
      opacity: 1;
    }
  
    #room-content {
      font-size: 30px;
      color: #5c8b10a1;
      text-shadow: 1px 1px 4px #ea00ff;
      font-weight: bold;
      position: absolute;
      top: 20px;
      
      
    }
  
    #doorStatus, #serverStatus, #response {
      font-size: 20px;
      margin-top: 20px;
      color: #fff;
      text-shadow: 1px 1px 3px #000;
    }

 button:hover {
      background: #00cccc;
    }
    #door-open-shadow-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  font-weight: bold;
  color: rgba(255, 255, 255, 0.08);
  text-shadow: 2px 2px 5px #000;
  z-index: 0;
  opacity: 0;
  transition: opacity 1s ease-in-out;
  pointer-events: none;
}

#door.open ~ #door-open-shadow-text {
  opacity: 1;
}
#door-box1{
  position: absolute;
      bottom: 20px;
      left: 19%;
      /* transform: translateX(-50%); */
      width: 10px;
      height: 25px;
      background-color: #aaa9a9;
      border-radius: 10%;
      box-shadow: 0 0 4px rgb(2, 255, 255);
      
}
#door-box2{
  position: absolute;
      bottom: 150px;
      left: 75%;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      background-color: #808080;
      border-radius: 10%;

      box-shadow: 0 0 8px rgb(10, 122, 250);
}
#door-box3{
  position: absolute;
      bottom: 10px;
      left: 25%;
      transform: translateX(-50%);
      width: 75px;
      height: 130px;
      background-color: #000000;
      border-radius: 10%;

      box-shadow: 0 0 8px rgb(167, 109, 33);
}
#door-box4{
  position: absolute;
      top: 180px;
      right: 40%;
      transform: translateX(-50%);
      width: 75px;
      height: 130px;
      background-color: #808080;
      border-radius: 10%;
      box-shadow: 0 0 8px rgb(10, 122, 250);
      
}

#room-inside {
      position: absolute;
      inset: 0;
      background: #ff009d;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
  
    #door.open #room-inside {
      opacity: 1;
    }
  
    #room-content {
      font-size: 30px;
      color: #5c8b10a1;
      text-shadow: 1px 1px 4px #ea00ff;
      font-weight: bold;
      position: absolute;
      top: 20px;
      
      
    }

input{
  padding:10px;
  font-size:16px;
  border-radius:8px;
  border:none;
}

/* ================= LOGIN SYSTEM ================= */
#loginOverlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #000000, #1a1a1a);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#loginBox {
  background: #111;
  padding: 50px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 0 30px cyan;
  width: 300px;
}

#loginBox h2 {
  margin-bottom: 20px;
  color: white;
}

#loginBox input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

#loginBox button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: cyan;
  font-size: 16px;
  cursor: pointer;
}

#loginBox button:hover {
  background: #00cccc;
}

#loginError {
  color: red;
  margin-top: 10px;
}

/* ================= PASSWORD PAGE ================= */
#password button {
  width: 90%;
  padding: 20px;
  margin: 10px 0;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

#password button:hover {
  background-color: #357ab8;
}

#password #faceCard {
  background: #fff;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  padding: 20px;
  margin-top: 20px;
  max-width: 400px;
  width: 90%;
  text-align: center;
}

#password input[type="text"] {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

#password video {
  border-radius: 10px;
  border: 2px solid #4a90e2;
  width: 100%;
  max-width: 320px;
  margin-top: 10px;
}

#password #status {
  margin-top: 15px;
  font-weight: bold;
  min-height: 20px;
}
</style>
</head>

<body>
<!-- ================= LOGIN SCREEN ================= -->
<div id="loginOverlay">
  <div id="loginBox">
    <h2>🔐 Smart Door Login</h2>
    <input type="text" id="loginId" placeholder="Enter User ID"><br>
    <input type="password" id="loginPassword" placeholder="Enter Password"><br>
    <button onclick="checkLogin()">Login</button>
    <a href="indexx.html" >Face Unlock</a>
    <p id="loginError"></p>
  </div>
</div>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
  <a href="#home">Home</a>
  <a href="#image">Image</a>
  <a href="#password">Password</a>
</div>

<!-- ================= HOME PAGE ================= -->
<div id="home" class="page">

<h1>Smart Door Control</h1>

<div id="door-container">
    
    <div id="glow-behind"></div>
    <div id="door" onclick="toggleDoor()">
      <div id="door-name">welcome </div>
      
      <!-- <div id="door-box1"></div> -->
      <div id="door-box2"></div>
      <!-- <div id="door-box3"></div> -->
      <div id="door-box4"></div>
      <div id="lock-led">
        <div id="door-box1"></div>
      </div>
      <div id="room-inside">
        <div id="door-box2"></div>
        <div id="door-box4"></div>
        <div id="room-content">welcome</div>
      </div>
    </div>
    <div id="door-open-shadow-text">OPEN</div>
  </div>

<p id="doorStatus">🔒 Door is CLOSED</p>
<button onclick="toggleDoor()">Door Switch</button>
<p id="serverStatus">🟡 Checking server status...</p>
<p id="response"></p>

</div>

<!-- ================= IMAGE PAGE ================= -->
<div id="image" class="page">
  <h1>Latest 5 Camera Images</h1>
  <div id="imageGallery" style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;"></div>
</div>

<!-- ================= PASSWORD + FACE REGISTRATION PAGE ================= -->
<div id="password" class="page">
  <h1>Account Options</h1>

  <button onclick="showPasswordSection()">Change Password</button>
  <button onclick="showFaceSection()">Face Registration</button>

  <!-- Password Section -->
  <div id="passwordSection" style="display:none; margin-top:20px;">
    <input type="password" id="newPassword" placeholder="Enter new password">
    <br>
    <button onclick="savePassword()">Save Password</button>
    <p id="passwordMessage"></p>
  </div>

  <!-- Face Registration Section -->
  <div id="faceSection" style="display:none; margin-top:20px;">
    <div id="faceCard">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Enter your name" required>
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" style="display:none;"></canvas>
      <div>
        <button id="captureBtn">Capture Photo</button>
        <button id="submitBtn" disabled>Register</button>
      </div>
      <p id="status"></p>
    </div>
  </div>

</div>



<script>
/* ================= PAGE ROUTING ================= */
function showPage(){
  const hash = window.location.hash || "#home";
  document.querySelectorAll(".page").forEach(p=>{p.classList.remove("active");});
  const activePage = document.querySelector(hash);
  if(activePage) activePage.classList.add("active");
  if(hash === "#image") loadImage();
}
window.addEventListener("hashchange", showPage);
window.addEventListener("load", showPage);

/* ================= DOOR SYSTEM ================= */
let doorOpen=false;
let autoCloseTimeout;
function toggleDoor(){
  const door=document.getElementById("door");
  const status=document.getElementById("doorStatus");
  const led=document.getElementById("lock-led");
  clearTimeout(autoCloseTimeout);
  if(!doorOpen){
    door.classList.add("open");
    doorOpen=true;
    status.innerText="🚪 Door is OPEN";
    led.style.boxShadow="0 0 10px #0f0";
    sendCommand("ON");
    autoCloseTimeout=setTimeout(()=>{
      door.classList.remove("open");
      doorOpen=false;
      status.innerText="🔒 Door is CLOSED";
      led.style.boxShadow="0 0 10px red";
      sendCommand("OFF");
    },8000);
  }else{
    door.classList.remove("open");
    doorOpen=false;
    status.innerText="🔒 Door is CLOSED";
    led.style.boxShadow="0 0 10px red";
    sendCommand("OFF");
  }
}

function sendCommand(command){
  fetch("https://itspg6i73e.execute-api.ap-southeast-2.amazonaws.com/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:command})
  })
  .then(res=>res.json())
  .then(data=>{document.getElementById("response").innerText="✅ Server Response: "+JSON.stringify(data);})
  .catch(()=>{document.getElementById("response").innerText="❌ Error sending command."});
}

/* ================= SERVER STATUS ================= */
function checkServerStatus(){
  fetch("https://itspg6i73e.execute-api.ap-southeast-2.amazonaws.com/status")
  .then(res=>{
    if(res.ok){
      document.getElementById("serverStatus").innerText="🟢 Server ONLINE";
      document.getElementById("serverStatus").style.color="#00ff00";
    }else{throw new Error();}
  })
  .catch(()=>{document.getElementById("serverStatus").innerText="🔴 Server OFFLINE"; document.getElementById("serverStatus").style.color="#ff4444";});
}
checkServerStatus();

/* ================= IMAGE LOADER ================= */
async function loadImage(){
  try{
    const response = await fetch("https://itspg6i73e.execute-api.ap-southeast-2.amazonaws.com/images");
    const data = await response.json();
    if(data.images && data.images.length > 0){
      data.images.sort((a,b)=>{const getTime = (obj)=>parseInt(obj.url.split("image-")[1]); return getTime(b)-getTime(a);});
      const latestFive = data.images.slice(0,5);
      const gallery = document.getElementById("imageGallery");
      gallery.innerHTML = "";
      latestFive.forEach(imgObj=>{
        const img = document.createElement("img");
        img.src = imgObj.url;
        img.width = 250;
        img.style.borderRadius = "10px";
        img.style.boxShadow = "0 0 10px rgba(0,0,0,0.5)";
        gallery.appendChild(img);
      });
    }
  }catch(err){console.log(err);}
}

/* ================= PASSWORD + FACE UI ================= */
function showPasswordSection(){
  document.getElementById("passwordSection").style.display="block";
  document.getElementById("faceSection").style.display="none";
  stopCamera();
}
function showFaceSection(){
  document.getElementById("passwordSection").style.display="none";
  document.getElementById("faceSection").style.display="block";
  startCamera();
}

/* ================= PASSWORD FUNCTION ================= */
async function savePassword(){
  const pass = document.getElementById("newPassword").value;
  const message = document.getElementById("passwordMessage");
  const token = sessionStorage.getItem("jwt");
  if(!token){ message.innerText = "❌ You must be logged in!"; return; }
  if(pass.length < 4){ message.innerText = "❌ Password must be at least 4 characters."; return; }
  try{
    const response = await fetch(
      "https://itspg6i73e.execute-api.ap-southeast-2.amazonaws.com/change-password",
      { method: "POST", headers: { "Content-Type": "application/json","Authorization": `Bearer ${token}` }, body: JSON.stringify({ password: pass }) }
    );
    const data = await response.json();
    if(response.ok){ message.innerText = "✅ Password updated successfully!"; } 
    else{ message.innerText = `❌ ${data.message}`; }
  }catch(err){ message.innerText = "⚠ Server Error"; }
}

/* ================= FACE REGISTRATION ================= */
/* ================= FACE REGISTRATION ================= */
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const captureBtn = document.getElementById('captureBtn');
const submitBtn = document.getElementById('submitBtn');
const status = document.getElementById('status');

let cameraStream = null;

/* Start Camera */
async function startCamera(){
  try{
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = cameraStream;
  }catch(err){
    console.log("Cannot access camera:", err);
  }
}

/* Stop Camera */
function stopCamera(){
  if(cameraStream){
    cameraStream.getTracks().forEach(track => track.stop());
    video.srcObject = null;
    cameraStream = null;
  }
}

/* Capture Photo */
captureBtn.addEventListener('click', () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  submitBtn.disabled = false;
  status.textContent = 'Photo captured. Ready to register.';
  status.style.color = '#4a90e2';
});

/* Register Face */
submitBtn.addEventListener('click', () => {
  const name = document.getElementById('name').value;

  if (!name) {
    alert('Please enter your name.');
    return;
  }

  canvas.toBlob(async (blob) => {

    const formData = new FormData();
    formData.append('name', name);
    formData.append('file', blob, 'photo.png');

    try {

      const response = await fetch('https://licenseless-censurable-guy.ngrok-free.dev/register', {
        method: 'POST',
        body: formData
      });

      if (response.ok) {

        status.textContent = '✅ Registration successful!';
        status.style.color = '#28a745';

        stopCamera();

      } else {

        const text = await response.text();
        status.textContent = `❌ Error: ${text}`;
        status.style.color = '#dc3545';

      }

    } catch (err) {

      status.textContent = `❌ Network error: ${err}`;
      status.style.color = '#dc3545';

    }

  }, 'image/png');
});

/* ================= LOGIN FUNCTION ================= */
async function checkLogin(){
  const idInput = document.getElementById("loginId").value;
  const passInput = document.getElementById("loginPassword").value;
  const error = document.getElementById("loginError");
  try{
    const response = await fetch("https://itspg6i73e.execute-api.ap-southeast-2.amazonaws.com/login",
      { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ userId: idInput, password: passInput }) }
    );
    const data = await response.json();
    if(data.token){
      document.getElementById("loginOverlay").style.display = "none";
      sessionStorage.setItem("loggedIn", "true");
      sessionStorage.setItem("jwt", data.token);
    } else { error.innerText = "❌ Invalid ID or Password"; }
  }catch(err){ error.innerText = "⚠ Server Error"; }
}
</script>

</body>
</html>
